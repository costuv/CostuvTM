<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown to July 12</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'montserrat': ['"Montserrat"', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #121212;
            color: #f5f5f5;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Background pattern */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.03) 0%, transparent 8%), 
                radial-gradient(circle at 90% 80%, rgba(255, 255, 255, 0.03) 0%, transparent 8%),
                radial-gradient(circle at 40% 60%, rgba(255, 255, 255, 0.03) 0%, transparent 6%),
                radial-gradient(circle at 70% 30%, rgba(255, 255, 255, 0.03) 0%, transparent 6%);
            background-size: 120% 120%;
            animation: moveBackground 30s ease infinite alternate;
            z-index: -1;
        }
        
        @keyframes moveBackground {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }
        
        .digit {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            transition: all 0.4s ease;
            position: relative;
        }
        
        .digit:hover {
            transform: scale(1.08);
            color: white;
        }
        
        .timer-container {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.36);
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .time-block {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .time-block::before {
            content: '';
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.1), transparent 70%);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        
        .time-block:hover::before {
            opacity: 1;
        }
        
        .pulsing {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        
        .decorative-element {
            position: absolute;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01));
            border-radius: 50%;
            z-index: 0;
        }
        
        /* Separator line with animation */
        .separator {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            position: relative;
            overflow: hidden;
        }
        
        .separator::after {
            content: '';
            position: absolute;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
            animation: moveLight 4s infinite;
        }
        
        @keyframes moveLight {
            0% { left: -50%; }
            100% { left: 100%; }
        }
        
        /* Loading Screen Styles */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease-in-out, visibility 0.6s ease-in-out;
        }
        
        .loading-container {
            text-align: center;
        }
        
        .loading-text {
            font-size: 1.2rem;
            letter-spacing: 0.25em;
            margin-bottom: 2rem;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 900;
        }
        
        .loading-spinner {
            display: inline-block;
            position: relative;
            width: 80px;
            height: 80px;
            margin-bottom: 2rem;
        }
        
        .loading-spinner:before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: rgba(255, 255, 255, 0.7);
            animation: spinner 1s linear infinite;
        }
        
        .loading-progress {
            width: 200px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            margin: 0 auto;
        }
        
        .loading-progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.5));
            transition: width 0.5s ease;
        }
        
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-logo {
            margin-bottom: 2rem;
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 0.1em;
        }
        
        .loading-logo .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: white;
            margin: 0 5px;
            opacity: 0.7;
        }
        
        .fade-out {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <!-- Decorative elements -->
    <div class="decorative-element" style="top: 10%; left: 5%; width: 200px; height: 200px; opacity: 0.05;"></div>
    <div class="decorative-element" style="bottom: 15%; right: 10%; width: 300px; height: 300px; opacity: 0.03;"></div>
    <div class="decorative-element" style="top: 40%; right: 20%; width: 100px; height: 100px; opacity: 0.07;"></div>
    
    <div class="timer-container rounded-xl p-8 md:p-12 w-full max-w-3xl backdrop-blur-sm">
        <h1 class="text-3xl md:text-5xl font-black text-center mb-2 tracking-tight">COUNTDOWN TO</h1>
        <h1 class="text-4xl md:text-6xl font-black text-center mb-8 tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-500 pulsing">JULY 12</h1>
        
        <div class="separator mb-8 mt-4"></div>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 text-center">
            <div class="time-block bg-black/30 rounded-lg p-4 backdrop-blur-md">
                <div id="days" class="text-5xl md:text-7xl font-black digit">00</div>
                <div class="text-sm md:text-base uppercase tracking-widest mt-2 opacity-70">Days</div>
            </div>
            <div class="time-block bg-black/30 rounded-lg p-4 backdrop-blur-md">
                <div id="hours" class="text-5xl md:text-7xl font-black digit">00</div>
                <div class="text-sm md:text-base uppercase tracking-widest mt-2 opacity-70">Hours</div>
            </div>
            <div class="time-block bg-black/30 rounded-lg p-4 backdrop-blur-md">
                <div id="minutes" class="text-5xl md:text-7xl font-black digit">00</div>
                <div class="text-sm md:text-base uppercase tracking-widest mt-2 opacity-70">Minutes</div>
            </div>
            <div class="time-block bg-black/30 rounded-lg p-4 backdrop-blur-md">
                <div id="seconds" class="text-5xl md:text-7xl font-black digit">00</div>
                <div class="text-sm md:text-base uppercase tracking-widest mt-2 opacity-70">Seconds</div>
            </div>
        </div>

        <div class="separator mt-8 mb-4"></div>
        
        <div id="timezone-info" class="text-center mt-4 text-sm font-light opacity-50"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Get current year
            const currentYear = new Date().getFullYear();
            
            // Set target date - July 12 of current year (or next year if July 12 has passed)
            let targetDate = new Date(Date.UTC(currentYear, 6, 12, 0, 0, 0)); // Month is 0-indexed, so 6 = July
            
            // If today's date is past July 12 of this year, set target to next year
            if (new Date() > targetDate) {
                targetDate = new Date(Date.UTC(currentYear + 1, 6, 12, 0, 0, 0));
            }

            // Display timezone info
            const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            document.getElementById('timezone-info').textContent = `Your timezone: ${timeZone}`;
            
            // Update the countdown every second
            const countdown = setInterval(updateCountdown, 1000);
            
            // Initial call
            updateCountdown();
            
            function updateCountdown() {
                const now = new Date();
                const diff = targetDate - now;
                
                // If countdown is over
                if (diff <= 0) {
                    clearInterval(countdown);
                    document.getElementById('days').textContent = '00';
                    document.getElementById('hours').textContent = '00';
                    document.getElementById('minutes').textContent = '00';
                    document.getElementById('seconds').textContent = '00';
                    
                    // Show a professional completion message
                    showCompletionMessage();
                    return;
                }
                
                // Calculate time units
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                
                // Update DOM with subtle animations
                updateElementWithTransition('days', days);
                updateElementWithTransition('hours', hours);
                updateElementWithTransition('minutes', minutes);
                updateElementWithTransition('seconds', seconds);
                
                // Update progress indicators
                updateProgressIndicators(days, hours, minutes, seconds);
                
                // Update the date display
                updateDateDisplay(diff);
            }
            
            // Add subtle animation when numbers change
            function updateElementWithTransition(id, value) {
                const element = document.getElementById(id);
                const formattedValue = value.toString().padStart(2, '0');
                
                if (element.textContent !== formattedValue) {
                    // More dramatic effect for seconds
                    if (id === 'seconds') {
                        element.style.transform = 'translateY(-10px) scale(1.1)';
                        element.style.opacity = '0.8';
                        element.style.textShadow = '0 0 15px rgba(255, 255, 255, 0.5)';
                        
                        // Apply pulse effect to the container
                        document.querySelector('.timer-container').classList.add('pulse-effect');
                        setTimeout(() => {
                            document.querySelector('.timer-container').classList.remove('pulse-effect');
                        }, 500);
                    } else {
                        element.style.transform = 'translateY(-10px)';
                        element.style.opacity = '0.5';
                    }
                    
                    setTimeout(() => {
                        element.textContent = formattedValue;
                        element.style.transform = 'translateY(0) scale(1)';
                        element.style.opacity = '1';
                        element.style.textShadow = '0 0 10px rgba(255, 255, 255, 0.2)';
                    }, 100);
                }
            }
            
            // Initialize professional linear progress indicator
            function initializeProgressIndicator() {
                const timeBlocks = document.querySelectorAll('.time-block');
                
                // Add progress bars to each time block
                timeBlocks.forEach((block, index) => {
                    // Create a minimal progress line
                    const progressLine = document.createElement('div');
                    progressLine.className = 'progress-line';
                    progressLine.style.position = 'absolute';
                    progressLine.style.bottom = '0';
                    progressLine.style.left = '0';
                    progressLine.style.height = '2px';
                    progressLine.style.width = '0%';
                    progressLine.style.background = 'linear-gradient(90deg, rgba(255,255,255,0.2), rgba(255,255,255,0.5))';
                    progressLine.style.transition = 'width 0.3s ease';
                    
                    // Add data attribute to identify which block
                    progressLine.dataset.timeUnit = ['days', 'hours', 'minutes', 'seconds'][index];
                    
                    block.style.position = 'relative';
                    block.appendChild(progressLine);
                    
                    // Add subtle dot pattern to time block background for visual interest
                    addDotPattern(block);
                });
            }
            
            // Create a minimal dot pattern for background texture
            function addDotPattern(element) {
                const dotPattern = document.createElement('div');
                dotPattern.className = 'dot-pattern';
                dotPattern.style.position = 'absolute';
                dotPattern.style.top = '0';
                dotPattern.style.left = '0';
                dotPattern.style.width = '100%';
                dotPattern.style.height = '100%';
                dotPattern.style.opacity = '0.05';
                dotPattern.style.zIndex = '-1';
                dotPattern.style.backgroundImage = 'radial-gradient(rgba(255, 255, 255, 0.5) 1px, transparent 1px)';
                dotPattern.style.backgroundSize = '15px 15px';
                
                element.appendChild(dotPattern);
            }
            
            // Update the progress indicators with a more refined animation
            function updateProgressIndicators(days, hours, minutes, seconds) {
                if (!document.querySelector('.progress-line')) {
                    initializeProgressIndicator();
                }
                
                // Calculate percentages
                const secondsPercent = ((60 - seconds) / 60) * 100;
                const minutesPercent = ((60 - minutes) / 60) * 100;
                const hoursPercent = ((24 - hours) / 24) * 100;
                
                // Max days to consider (for percentage calculation)
                const maxDays = 100;
                const daysPercent = Math.min(((maxDays - days) / maxDays) * 100, 100);
                
                // Update progress lines
                updateProgressLine('days', daysPercent);
                updateProgressLine('hours', hoursPercent);
                updateProgressLine('minutes', minutesPercent);
                updateProgressLine('seconds', secondsPercent);
            }
            
            // Update individual progress line with smooth animation
            function updateProgressLine(unit, percentage) {
                const progressLine = document.querySelector(`.progress-line[data-time-unit="${unit}"]`);
                if (progressLine) {
                    progressLine.style.width = `${percentage}%`;
                }
            }
            
            // Enhanced update countdown function with professional refinements
            function updateCountdown() {
                const now = new Date();
                const diff = targetDate - now;
                
                // If countdown is over
                if (diff <= 0) {
                    clearInterval(countdown);
                    document.getElementById('days').textContent = '00';
                    document.getElementById('hours').textContent = '00';
                    document.getElementById('minutes').textContent = '00';
                    document.getElementById('seconds').textContent = '00';
                    
                    // Show a professional completion message
                    showCompletionMessage();
                    return;
                }
                
                // Calculate time units
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                
                // Update DOM with subtle animations
                updateElementWithTransition('days', days);
                updateElementWithTransition('hours', hours);
                updateElementWithTransition('minutes', minutes);
                updateElementWithTransition('seconds', seconds);
                
                // Update progress indicators
                updateProgressIndicators(days, hours, minutes, seconds);
                
                // Update the date display
                updateDateDisplay(diff);
            }
            
            // Update target date display
            function updateDateDisplay(diff) {
                // Create date display if it doesn't exist
                if (!document.getElementById('date-display')) {
                    const targetDateFormatted = targetDate.toLocaleDateString('en-US', { 
                        weekday: 'long', 
                        year: 'numeric', 
                        month: 'long', 
                        day: 'numeric' 
                    });
                    
                    const dateDisplay = document.createElement('div');
                    dateDisplay.id = 'date-display';
                    dateDisplay.className = 'text-center mt-8 mb-2';
                    dateDisplay.innerHTML = `
                        <div class="text-xs uppercase tracking-widest text-white/30 mb-1">Target Date</div>
                        <div class="text-sm md:text-base text-white/70">${targetDateFormatted}</div>
                    `;
                    
                    // Find the timezone info element and insert before it
                    const timezoneInfo = document.getElementById('timezone-info');
                    timezoneInfo.parentNode.insertBefore(dateDisplay, timezoneInfo);
                }
            }
            
            // Replace "JULY 12" with creative release branding
            function enhanceReleaseDateDisplay() {
                const releaseDateHeading = document.querySelector('.pulsing');
                if (releaseDateHeading && releaseDateHeading.textContent.trim() === 'JULY 12') {
                    // Create more engaging release date content
                    const releaseContainer = document.createElement('div');
                    releaseContainer.className = 'release-display flex flex-col items-center justify-center mb-2';
                    
                    releaseContainer.innerHTML = `
                        <div class="text-xs uppercase tracking-widest text-white/40 mb-1">THE RELEASE</div>
                        <div class="release-name text-4xl md:text-6xl font-black text-center tracking-tight mb-2 glowing-text">LAUNCH DAY</div>
                        <div class="release-date text-sm md:text-base tracking-wider text-white/70">
                            <span class="px-2 py-1 bg-white/5 rounded mr-1">7</span>.<span class="px-2 py-1 bg-white/5 rounded ml-1">12</span>
                        </div>
                        <div class="line-decorator w-16 h-0.5 bg-gradient-to-r from-transparent via-white/30 to-transparent mt-4"></div>
                    `;
                    
                    // Replace the original heading with our enhanced version
                    releaseDateHeading.parentNode.replaceChild(releaseContainer, releaseDateHeading);
                    
                    // Add event listener to create hover effect
                    const releaseName = releaseContainer.querySelector('.release-name');
                    releaseName.addEventListener('mouseenter', () => {
                        releaseName.classList.add('enhanced-glow');
                        setTimeout(() => {
                            releaseName.classList.remove('enhanced-glow');
                        }, 1000);
                    });
                }
            }
            
            // Initialize enhancements
            initializeProgressIndicator();
            enhanceReleaseDateDisplay();
            
            // Add professional refined styles
            function addProfessionalStyles() {
                const style = document.createElement('style');
                style.textContent = `
                    /* Refined animations for time blocks */
                    .time-block {
                        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
                    }
                    
                    .time-block:hover {
                        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15);
                        background: rgba(255, 255, 255, 0.03);
                    }
                    
                    /* Elegant transition for changing values */
                    @keyframes textChange {
                        0% { opacity: 0.8; transform: translateY(-5px); }
                        100% { opacity: 1; transform: translateY(0); }
                    }
                    
                    /* Refined separator */
                    .separator {
                        margin: 2rem auto;
                        width: 50%;
                    }
                    
                    /* Creative Release Date Styling */
                    .glowing-text {
                        background: linear-gradient(120deg, #ffffff, #a0a0a0, #ffffff);
                        background-size: 200% auto;
                        color: #000;
                        background-clip: text;
                        -webkit-background-clip: text;
                        -webkit-text-fill-color: transparent;
                        animation: shine 8s linear infinite;
                        text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
                    }
                    
                    @keyframes shine {
                        to { background-position: 200% center; }
                    }
                    
                    .release-date span {
                        display: inline-block;
                        transition: all 0.3s ease;
                    }
                    
                    .release-date span:hover {
                        background: rgba(255, 255, 255, 0.2);
                        transform: translateY(-2px);
                    }
                    
                    .line-decorator {
                        position: relative;
                    }
                    
                    .line-decorator::before,
                    .line-decorator::after {
                        content: '';
                        position: absolute;
                        top: 50%;
                        width: 3px;
                        height: 3px;
                        border-radius: 50%;
                        background: rgba(255, 255, 255, 0.5);
                        transform: translateY(-50%);
                    }
                    
                    .line-decorator::before {
                        left: -5px;
                    }
                    
                    .line-decorator::after {
                        right: -5px;
                    }
                    
                    .enhanced-glow {
                        animation: pulseGlow 1s ease;
                    }
                    
                    @keyframes pulseGlow {
                        0% { text-shadow: 0 0 5px rgba(255, 255, 255, 0.1); }
                        50% { text-shadow: 0 0 20px rgba(255, 255, 255, 0.4), 0 0 30px rgba(255, 255, 255, 0.2); }
                        100% { text-shadow: 0 0 5px rgba(255, 255, 255, 0.1); }
                    }
                    
                    /* Update completion message to match the new branding */
                    .completion-message .title {
                        background: linear-gradient(120deg, #ffffff, #a0a0a0, #ffffff);
                        background-size: 200% auto;
                        color: #000;
                        background-clip: text;
                        -webkit-background-clip: text;
                        -webkit-text-fill-color: transparent;
                    }
                    
                    /* Loading Screen Styles */
                    .loading-overlay {
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                        background-color: #121212;
                        display: flex;
                        flex-direction: column;
                        justify-content: center;
                        align-items: center;
                        z-index: 9999;
                        transition: opacity 0.6s ease-in-out, visibility 0.6s ease-in-out;
                    }
                    
                    .loading-container {
                        text-align: center;
                    }
                    
                    .loading-text {
                        font-size: 1.2rem;
                        letter-spacing: 0.25em;
                        margin-bottom: 2rem;
                        text-transform: uppercase;
                        color: rgba(255, 255, 255, 0.7);
                        font-weight: 900;
                    }
                    
                    .loading-spinner {
                        display: inline-block;
                        position: relative;
                        width: 80px;
                        height: 80px;
                        margin-bottom: 2rem;
                    }
                    
                    .loading-spinner:before {
                        content: '';
                        position: absolute;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                        border-radius: 50%;
                        border: 3px solid rgba(255, 255, 255, 0.1);
                        border-top-color: rgba(255, 255, 255, 0.7);
                        animation: spinner 1s linear infinite;
                    }
                    
                    .loading-progress {
                        width: 200px;
                        height: 2px;
                        background-color: rgba(255, 255, 255, 0.1);
                        position: relative;
                        overflow: hidden;
                        margin: 0 auto;
                    }
                    
                    .loading-progress-bar {
                        position: absolute;
                        top: 0;
                        left: 0;
                        height: 100%;
                        width: 0%;
                        background: linear-gradient(90deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.5));
                        transition: width 0.5s ease;
                    }
                    
                    @keyframes spinner {
                        0% { transform: rotate(0deg); }
                        100% { transform: rotate(360deg); }
                    }
                    
                    .loading-logo {
                        margin-bottom: 2rem;
                        font-size: 1.5rem;
                        font-weight: 900;
                        letter-spacing: 0.1em;
                    }
                    
                    .loading-logo .dot {
                        display: inline-block;
                        width: 8px;
                        height: 8px;
                        border-radius: 50%;
                        background: white;
                        margin: 0 5px;
                        opacity: 0.7;
                    }
                    
                    .fade-out {
                        opacity: 0;
                        visibility: hidden;
                    }
                `;
                document.head.appendChild(style);
            }
            
            // Update completion message to match new branding
            function showCompletionMessage() {
                const container = document.querySelector('.timer-container');
                
                // Create an elegant overlay with the new branding
                const overlay = document.createElement('div');
                overlay.className = 'absolute inset-0 flex flex-col items-center justify-center bg-black/80 rounded-xl backdrop-blur-sm completion-message';
                overlay.innerHTML = `
                    <div class="w-20 h-0.5 bg-gradient-to-r from-transparent via-white/30 to-transparent mb-6"></div>
                    <div class="title text-3xl md:text-5xl font-black tracking-wider mb-4">LAUNCH DAY</div>
                    <div class="text-sm uppercase tracking-widest text-white/50">
                        <span class="px-2 py-1 bg-white/5 rounded mr-1">7</span>.<span class="px-2 py-1 bg-white/5 rounded ml-1">12</span>
                        <span class="ml-2">${targetDate.getFullYear()}</span>
                    </div>
                    <div class="mt-6 text-sm text-white/40">The wait is over</div>
                `;
                
                // Add subtle fade-in animation
                overlay.style.animation = 'fadeIn 1s ease forwards';
                
                container.appendChild(overlay);
                
                // Add the required keyframe animation if not already added
                if (!document.querySelector('style').textContent.includes('@keyframes fadeIn')) {
                    const styleSheet = document.styleSheets[0];
                    styleSheet.insertRule(`
                        @keyframes fadeIn {
                            from { opacity: 0; }
                            to { opacity: 1; }
                        }
                    `, styleSheet.cssRules.length);
                }
            }
            
            // Handle loading screen
            function handleLoadingScreen() {
                // Create and add loading screen to the DOM at the top of the body
                const loadingOverlay = document.createElement('div');
                loadingOverlay.className = 'loading-overlay';
                loadingOverlay.innerHTML = `
                    <div class="loading-container">
                        <div class="loading-logo">
                            LAUNCH<span class="dot"></span>DAY
                        </div>
                        <div class="loading-spinner"></div>
                        <div class="loading-text">Preparing Countdown</div>
                        <div class="loading-progress">
                            <div class="loading-progress-bar"></div>
                        </div>
                    </div>
                `;
                
                document.body.insertBefore(loadingOverlay, document.body.firstChild);
                
                // Simulate loading progress
                const progressBar = loadingOverlay.querySelector('.loading-progress-bar');
                let progress = 0;
                const progressInterval = setInterval(() => {
                    progress += Math.random() * 15;
                    if (progress > 100) progress = 100;
                    progressBar.style.width = `${progress}%`;
                    
                    if (progress === 100) {
                        clearInterval(progressInterval);
                        // Wait a bit before hiding loading screen
                        setTimeout(() => {
                            loadingOverlay.classList.add('fade-out');
                            // Remove from DOM after animation
                            setTimeout(() => {
                                loadingOverlay.remove();
                            }, 600);
                        }, 500);
                    }
                }, 200);
            }
            
            // Initialize professional styles and handle loading
            addProfessionalStyles();
            handleLoadingScreen();
        });
    </script>
</body>
</html>
